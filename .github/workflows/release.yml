name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libflac-dev libogg-dev libvorbis-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            suffix: linux-amd64
            deps: sudo apt-get update && sudo apt-get install -y libasound2-dev libflac-dev libogg-dev libvorbis-dev
          - os: macos-15
            suffix: darwin-arm64
            deps: brew install libogg libvorbis flac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Install dependencies
        run: ${{ matrix.deps }}

      - name: Build
        run: go build -o orpheus-${{ matrix.suffix }} ./cmd/orpheus

      - name: Package
        run: tar -czf orpheus-${{ matrix.suffix }}.tar.gz orpheus-${{ matrix.suffix }}

      - name: Checksum
        run: sha256sum orpheus-${{ matrix.suffix }}.tar.gz > orpheus-${{ matrix.suffix }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            orpheus-${{ matrix.suffix }}.tar.gz
            orpheus-${{ matrix.suffix }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
